<!DOCTYPE html>
<html>
<head>
    <title>VAULT-TEC // PROBE</title>
    <style>
        body { background: #000; color: #33ff33; font-family: monospace; padding: 20px; text-transform: uppercase; }
        #output { border: 1px solid #33ff33; padding: 15px; height: 60vh; overflow: auto; white-space: pre-wrap; background: #050505; color: #00ff00; }
        button { background: #33ff33; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>VAULT 1848 DATA PROBE</h1>
    <p>IF YOU CAN SEE THIS, RENDERING IS ACTIVE.</p>
    <button onclick="runProbe()">INITIATE INTROSPECTION SCAN</button>
    <div id="output">READY.</div>
    <script>
        async function runProbe() {
            const out = document.getElementById('output');
            out.innerText = "QUERYING UNRAID API...";
            try {
                const res = await fetch('/api/probe');
                const data = await res.json();
                out.innerText = JSON.stringify(data, null, 4);
            } catch (e) { out.innerText = "FAILED: " + e; }
        }
    </script>
</body>
</html>
