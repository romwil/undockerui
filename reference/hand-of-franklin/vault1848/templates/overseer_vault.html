<!DOCTYPE html>
<html>
<head>
    <title>OVERSEER OFFICE // VAULT 1848</title>
    <style>
        :root { --amber: #ffb642; --bg: #1a1205; }
        body { background-color: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin:0; padding:25px; overflow:hidden; }
        .crt::before { content:" "; position:fixed; top:0; left:0; bottom:0; right:0; background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%); background-size:100% 3px; z-index:100; pointer-events:none; }
        .grid { display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 20px; margin-top: 20px; }
        .admin-sector { border: 1px solid rgba(255,182,66,0.3); padding: 15px; height: 260px; }
        textarea { width:100%; height:160px; background:#000; color:var(--amber); border:1px solid var(--amber); padding:10px; box-sizing:border-box; }
        button { background:none; color:var(--amber); border:1px solid var(--amber); padding:8px; width:100%; cursor:pointer; margin-top:10px; font-weight:bold; }
        button:hover { background:var(--amber); color:var(--bg); }
        a { color:var(--amber); text-decoration:none; display:block; margin:10px 0; font-size:0.9em; }

        .ticker-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--amber); }
        .ticker-lore { border-bottom: 1px solid rgba(255,182,66,0.1); padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .ticker-data { padding: 5px 0; overflow: hidden; white-space: nowrap; background: rgba(255,182,66,0.05); }
        .marquee { display: inline-block; padding-left: 100%; animation: scroll-lore 120s linear infinite; font-size: 1.3em; letter-spacing: 2px; }
        .marquee-fast { display: inline-block; padding-left: 100%; animation: scroll-data 45s linear infinite; font-size: 0.85em; opacity: 0.8; }
        @keyframes scroll-lore { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes scroll-data { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="crt">
    <div style="border-bottom: 1px solid var(--amber); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin:0; font-size:2em; letter-spacing:-2px;">COMMAND CONSOLE</h1>
        <button id="radio-btn" onclick="toggleRadio()" style="width: auto; padding: 5px 20px;">📻 RADIO: OFF</button>
    </div>
    <div class="grid">
        <div class="admin-sector">
            <h2>> ADMIN LINKS</h2>
            <a href="http://10.10.1.202:8081" target="_blank">>> UNRAID</a>
            <a href="http://10.10.1.10" target="_blank">>> SWAG</a>
            <a href="http://10.10.1.222" target="_blank">>> ADGUARD</a>
        </div>
        <div class="admin-sector">
            <h2>> LOGIC INJECTOR</h2>
            <textarea id="payload" placeholder="Input Atlassian JSON..."></textarea>
            <button onclick="deploy()">DEPLOY TO CORE</button>
        </div>
    </div>
    <div class="ticker-footer">
        <div class="ticker-lore"><div id="lore-stream" class="marquee">COMMAND LINK ACTIVE...</div></div>
        <div class="ticker-data"><div id="data-stream" class="marquee-fast">SCANNING TELEMETRY...</div></div>
    </div>
    <audio id="radio-player" loop></audio>
    <script>
        async function update() {
            try {
                const res = await fetch('/api/telemetry');
                const data = await res.json();
                if(data.lore_stream) document.getElementById('lore-stream').innerText = data.lore_stream;
                if(data.telemetry_stream) document.getElementById('data-stream').innerText = data.telemetry_stream;
            } catch (e) { console.error("Link severed"); }
        }
        setInterval(update, 10000); update();

        async function deploy() {
            const formData = new URLSearchParams();
            formData.append('payload', document.getElementById('payload').value);
            await fetch('/execute', { method: 'POST', body: formData });
            document.getElementById('payload').value = '';
            alert("Enqueued.");
        }

        async function toggleRadio() {
            const btn = document.getElementById('radio-btn');
            const audio = document.getElementById('radio-player');
            if (btn.innerText.includes("OFF")) {
                btn.innerText = "📻 TUNING...";
                const formData = new URLSearchParams();
                formData.append('payload', JSON.stringify({action: 'sync_radio'}));
                await fetch('/execute', { method: 'POST', body: formData });
                const checkUrl = setInterval(async () => {
                    const res = await fetch('/api/telemetry');
                    const data = await res.json();
                    if (data.radio_url) { audio.src = data.radio_url; audio.play(); btn.innerText = "📻 TUNED"; clearInterval(checkUrl); }
                }, 4000);
            } else { audio.pause(); btn.innerText = "📻 RADIO: OFF"; }
        }
    </script>
</body>
</html>
