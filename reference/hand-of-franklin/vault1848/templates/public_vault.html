<!DOCTYPE html>
<html>
<head>
    <title>VAULT 1848 // MARPLE</title>
    <style>
        :root { --amber: #ffb642; --bg: #1a1205; }
        body { background-color: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin:0; padding:25px; overflow:hidden; }
        .crt::before { content:" "; position:fixed; top:0; left:0; bottom:0; right:0; background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%); background-size:100% 3px; z-index:100; pointer-events:none; }
        .grid { display: grid; grid-template-columns: 1fr 0.8fr; gap: 20px; margin-top: 20px; }
        .sector { border: 1px solid rgba(255,182,66,0.2); padding: 15px; height: 210px; }
        a { color: var(--amber); text-decoration: none; display: block; margin: 12px 0; }
        a:hover { background: var(--amber); color: var(--bg); }
        
        /* CNN TICKER STACK */
        .ticker-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--amber); }
        .ticker-lore { border-bottom: 1px solid rgba(255,182,66,0.1); padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .ticker-data { padding: 5px 0; overflow: hidden; white-space: nowrap; background: rgba(255,182,66,0.05); }
        .marquee { display: inline-block; padding-left: 100%; animation: scroll-lore 120s linear infinite; font-size: 1.3em; letter-spacing: 2px; }
        .marquee-fast { display: inline-block; padding-left: 100%; animation: scroll-data 45s linear infinite; font-size: 0.85em; opacity: 0.8; }
        @keyframes scroll-lore { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes scroll-data { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="crt">
    <div style="border-bottom: 1px solid var(--amber); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end;">
        <h1 style="margin:0; font-size:2.2em; letter-spacing:-2px;">VAULT 1848</h1>
        <div id="clock" style="font-size:1.8em; font-weight:bold;">--:--:--</div>
    </div>
    <div class="grid">
        <div class="sector">
            <h2 style="font-size:0.9em; opacity:0.7;">> BROADCASTS</h2>
            <a href="http://10.10.1.200:32400" target="_blank">>> HOLOVISION (PLEX)</a>
            <a href="http://10.10.1.121:5055" target="_blank">>> REQUESTS (SEERR)</a>
            <a href="http://10.10.1.70" target="_blank">>> RECREATION (RETRO)</a>
        </div>
        <div class="sector">
            <h2 style="font-size:0.9em; opacity:0.7;">> STATUS</h2>
            <div id="stats" style="font-size:1.1em; line-height:1.8; margin-top:10px;">SCANNING...</div>
        </div>
    </div>
    <div class="ticker-footer">
        <div class="ticker-lore"><div id="lore-stream" class="marquee">VAULT 1848 BROADCAST SYSTEM...</div></div>
        <div class="ticker-data"><div id="data-stream" class="marquee-fast">SCANNING TELEMETRY...</div></div>
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch('/api/telemetry');
                const data = await res.json();
                document.getElementById('clock').innerText = data.timestamp;
                document.getElementById('stats').innerHTML = `<p>INTEGRITY: ${data.vault_integrity}</p><p>REACTOR: 106 F</p>`;
                if(data.lore_stream) document.getElementById('lore-stream').innerText = data.lore_stream;
                if(data.telemetry_stream) document.getElementById('data-stream').innerText = data.telemetry_stream;
            } catch (e) { console.error("Link severed"); }
        }
        setInterval(update, 10000); update();
    </script>
</body>
</html>
